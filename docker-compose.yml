services:
  backend:
    container_name: backend
    build: ./backend
    ports:
      - "3000:3000"
      - "4000:4000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/src:/app/src
      - ./backend/secrets:/app/secrets
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - '5173:5173'
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    restart: unless-stopped
    env_file:
      - ./frontend/.env
